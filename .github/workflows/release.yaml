name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: [self-hosted, linux, x64, krubecible, holybits-shared]
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          token: ${{ secrets.GITHUB_TOKEN }}

  sync-manifest:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: [self-hosted, linux, x64, krubecible, holybits-shared]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json version
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/gree_ext/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '${VERSION}'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/gree_ext/manifest.json
          git diff --cached --quiet || git commit -m "chore: sync manifest.json to v${VERSION}"
          git push
